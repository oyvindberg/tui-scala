$schema: https://raw.githubusercontent.com/oyvindberg/bleep/master/schema.json
$version: 1.0.0-M9
jvm:
  name: graalvm-community:25.0.1
projects:
  crossterm:
    java:
      options: --release 17
    platform:
      name: jvm
    sourcegen:
      main: tui.scripts.GenJniLibrary
      project: scripts
  jatatui-core:
    java:
      options: --release 21
    platform:
      name: jvm
  jatatui-widgets:
    dependsOn: jatatui-core
    java:
      options: --release 21
    platform:
      name: jvm
  jatatui-crossterm:
    dependsOn:
    - jatatui-core
    - crossterm
    java:
      options: --release 21
    platform:
      name: jvm
  jatatui-tests:
    dependencies:
    - org.junit.jupiter:junit-jupiter:5.11.3
    - org.junit.jupiter:junit-jupiter-engine:5.11.3
    - com.github.sbt.junit:jupiter-interface:0.13.3
    dependsOn:
    - jatatui-core
    - jatatui-widgets
    - jatatui-crossterm
    - jatatui-react
    - jatatui-components
    isTestProject: true
    java:
      options: --release 21
    platform:
      name: jvm
  jatatui-react:
    dependsOn:
    - jatatui-core
    - jatatui-widgets
    - jatatui-crossterm
    java:
      options: --release 21
    platform:
      name: jvm
  jatatui-components:
    dependsOn:
    - jatatui-core
    - jatatui-widgets
    - jatatui-react
    java:
      options: --release 21
    platform:
      name: jvm
  jatatui-demo:
    dependsOn:
    - jatatui-core
    - jatatui-widgets
    - jatatui-crossterm
    java:
      options: --release 21
    platform:
      name: jvm
      mainClass: jatatui.examples.Launcher
  jatatui-demo-react:
    dependsOn:
    - jatatui-core
    - jatatui-widgets
    - jatatui-crossterm
    - jatatui-react
    - jatatui-components
    java:
      options: --release 21
    platform:
      name: jvm
      mainClass: jatatui.react.examples.Launcher
  scripts:
    dependencies:
    - build.bleep::bleep-plugin-ci-release:${BLEEP_VERSION}
    - build.bleep::bleep-plugin-jni:${BLEEP_VERSION}
    - build.bleep::bleep-plugin-native-image:${BLEEP_VERSION}
    extends:
    - template-scala-2
    - template-scala-common
scripts:
  gen-headers:
    main: tui.scripts.GenHeaders
    project: scripts
  gen-native-image:
    main: tui.scripts.GenNativeImage
    project: scripts
  my-publish-local:
    main: tui.scripts.PublishLocal
    project: scripts
  publish:
    main: tui.scripts.Publish
    project: scripts
templates:
  template-scala-2:
    scala:
      version: 3.8.3
  template-scala-common:
    platform:
      name: jvm
    scala:
      options: -encoding utf8 -feature -unchecked
      strict: true
