name: Build
on:
  push:
    tags: [ 'jatatui-v*' ]
    branches: [ 'main' ]
  pull_request:
    branches: [ 'main' ]

jobs:
  build:
    name: Compile + test
    timeout-minutes: 15
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'ci skip')"
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: bleep-build/bleep-setup-action@0.0.2
      - uses: coursier/cache-action@v7
        with:
          extraFiles: bleep.yaml

      - name: Compile
        run: bleep compile

      - name: Run tests
        run: bleep test jatatui-tests

  build-native:
    name: Build JNI library on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            jni-folder: .bleep/generated-resources/crossterm/tui.scripts.GenJniLibrary
            bootstrap_coursier: false
          - os: ubuntu-22.04-arm
            jni-folder: .bleep/generated-resources/crossterm/tui.scripts.GenJniLibrary
            bootstrap_coursier: true
          - os: macos-15-intel
            jni-folder: .bleep/generated-resources/crossterm/tui.scripts.GenJniLibrary
            bootstrap_coursier: false
          - os: macos-latest
            jni-folder: .bleep/generated-resources/crossterm/tui.scripts.GenJniLibrary
            bootstrap_coursier: false
          - os: windows-latest
            jni-folder: .bleep\generated-resources\crossterm\tui.scripts.GenJniLibrary
            bootstrap_coursier: false
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      # ARM64 Linux needs JDK 21+ for UnixDomainSocketAddress in the BSP server
      - uses: actions/setup-java@v5
        if: ${{ matrix.bootstrap_coursier }}
        with:
          distribution: 'temurin'
          java-version: '21'

      # Standard bootstrap via setup action (platforms with existing native binaries)
      - uses: bleep-build/bleep-setup-action@0.0.2
        if: ${{ !matrix.bootstrap_coursier }}

      # ARM64 Linux: bootstrap bleep via Coursier (no pre-built native binary yet)
      - name: Bootstrap bleep via Coursier
        if: ${{ matrix.bootstrap_coursier }}
        run: |
          BLEEP_VERSION=$(grep '^\$version:' bleep.yaml | cut -d' ' -f2)
          echo "Bootstrapping bleep $BLEEP_VERSION via Coursier"
          curl -fL "https://github.com/coursier/launchers/raw/master/cs-aarch64-pc-linux.gz" | gzip -d > cs
          chmod +x cs
          ./cs install --channel https://raw.githubusercontent.com/oyvindberg/bleep/master/coursier-channel.json "bleep:$BLEEP_VERSION" --install-dir /usr/local/bin
          rm cs

      - uses: coursier/cache-action@v7
        with:
          extraFiles: bleep.yaml

      - name: Cache cargo
        uses: actions/cache@v5
        continue-on-error: false
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: jatatui-v1-${{ runner.arch }}-${{ runner.os }}-cargo-${{ hashFiles('crossterm/cargo/**/Cargo.lock', 'crossterm/cargo/**/*.rs') }}
          restore-keys: jatatui-v1-${{ runner.arch }}-${{ runner.os }}-cargo-

      # Sourcegen on the crossterm project triggers cargo to build the native lib and copy it to
      # generated-resources. Running the JNI smoke test verifies the lib loads correctly.
      - name: Build native lib + smoke-test JNI
        if: runner.os != 'Windows' && !matrix.bootstrap_coursier
        run: bleep test jatatui-tests jatatui.tests.crossterm.CrosstermBackendTest

      - name: Build native lib + smoke-test JNI (arm64)
        if: ${{ matrix.bootstrap_coursier }}
        run: bleep --dev test jatatui-tests jatatui.tests.crossterm.CrosstermBackendTest

      - name: Build native lib + smoke-test JNI (windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: bleep test jatatui-tests jatatui.tests.crossterm.CrosstermBackendTest

      - name: Upload native lib artifact
        uses: actions/upload-artifact@v4
        with:
          name: jatatui-jni-${{ matrix.os }}
          path: ${{ matrix.jni-folder }}
          retention-days: 1

  publish:
    name: Publish to Sonatype
    timeout-minutes: 20
    runs-on: ubuntu-latest
    needs: [ build, build-native ]
    if: "startsWith(github.ref, 'refs/tags/jatatui-v')"
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: bleep-build/bleep-setup-action@0.0.2
      - uses: coursier/cache-action@v7
        with:
          extraFiles: bleep.yaml

      # Tag form: jatatui-vX.Y.Z → version X.Y.Z
      - name: Resolve version from tag
        id: ver
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#jatatui-v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Download all native artifacts
        uses: actions/download-artifact@v4
        with:
          path: .bleep/generated-resources/crossterm/tui.scripts.GenJniLibrary
          pattern: jatatui-jni-*
          merge-multiple: true

      - name: List downloaded native libs
        run: find .bleep/generated-resources/crossterm

      # Force bleep to load + record the build before publish, then bump file timestamps so the
      # downloaded native libs are considered current (otherwise the sourcegen tracker reruns
      # cargo, which we don't have toolchains for here).
      - name: Prime build
        run: bleep projects
      - name: Touch downloaded artifacts
        run: find .bleep/generated-resources/crossterm -type f -exec touch {} +

      - name: Publish to Sonatype
        run: bleep publish sonatype --version "${{ steps.ver.outputs.version }}" --assert-release
        env:
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "jatatui ${{ steps.ver.outputs.version }}"
          tag_name: ${{ steps.ver.outputs.tag }}
          prerelease: false
          generate_release_notes: true
