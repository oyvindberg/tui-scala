name: Build
on:
  push:
    tags: [ 'v*' ]
    branches: [ 'master' ]
  pull_request:
    branches: [ 'master' ]

jobs:
  build:
    name: Compile, test, check formatting
    timeout-minutes: 15
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'ci skip')"
    steps:
      - uses: actions/checkout@v6
      - uses: bleep-build/bleep-setup-action@0.0.2
      - uses: coursier/cache-action@v7
        with:
          extraFiles: bleep.yaml

      - name: Scalafmt Check
        run: bleep fmt --check

      - name: Run tests
        run: |
          bleep compile
          bleep test

  build-native:
    name: Build JNI library on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            jni-folder: .bleep/generated-resources/crossterm/tui.scripts.GenJniLibrary
            bootstrap_coursier: false
          - os: ubuntu-22.04-arm
            jni-folder: .bleep/generated-resources/crossterm/tui.scripts.GenJniLibrary
            bootstrap_coursier: true
          - os: macos-15-intel
            jni-folder: .bleep/generated-resources/crossterm/tui.scripts.GenJniLibrary
            bootstrap_coursier: false
          - os: macos-latest
            jni-folder: .bleep/generated-resources/crossterm/tui.scripts.GenJniLibrary
            bootstrap_coursier: false
          - os: windows-latest
            jni-folder: .bleep\generated-resources\crossterm\tui.scripts.GenJniLibrary
            bootstrap_coursier: false
    steps:
      - uses: actions/checkout@v6

      # ARM64 Linux needs JDK 21+ for UnixDomainSocketAddress in BSP server
      - uses: actions/setup-java@v5
        if: ${{ matrix.bootstrap_coursier }}
        with:
          distribution: 'temurin'
          java-version: '21'

      # Standard bootstrap via setup action (platforms with existing native binaries)
      - uses: bleep-build/bleep-setup-action@0.0.2
        if: ${{ !matrix.bootstrap_coursier }}

      # Bootstrap via Coursier for ARM64 Linux (no pre-built native binary yet)
      - name: Bootstrap bleep via Coursier
        if: ${{ matrix.bootstrap_coursier }}
        run: |
          BLEEP_VERSION=$(grep '^\$version:' bleep.yaml | cut -d' ' -f2)
          echo "Bootstrapping bleep $BLEEP_VERSION via Coursier"
          curl -fL "https://github.com/coursier/launchers/raw/master/cs-aarch64-pc-linux.gz" | gzip -d > cs
          chmod +x cs
          ./cs install --channel https://raw.githubusercontent.com/oyvindberg/bleep/master/coursier-channel.json "bleep:$BLEEP_VERSION" --install-dir /usr/local/bin
          rm cs

      - uses: coursier/cache-action@v7
        with:
          extraFiles: bleep.yaml
      - name: Set up cargo cache
        uses: actions/cache@v5
        continue-on-error: false
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: v1-${{ runner.arch }}-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.arch }}-${{ runner.os }}-cargo-

      - name: Test jni library
        run: bleep run demo@jvm3 check
        if: runner.os != 'Windows' && !matrix.bootstrap_coursier

      - name: Test jni library (arm64)
        run: bleep --dev run demo@jvm3 check
        if: ${{ matrix.bootstrap_coursier }}

      - name: Test jni library (windows)
        run: bleep run demo@jvm3 check
        shell: cmd
        if: runner.os == 'Windows'

      - name: Temporarily save package
        uses: actions/upload-artifact@v7
        with:
          name: tui.scripts.GenJniLibrary-${{ matrix.os }}
          path: ${{ matrix.jni-folder }}
          retention-days: 1

  publish:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    needs: [ build, build-native ]
    if: "startsWith(github.ref, 'refs/tags/v')"
    steps:
      - uses: actions/checkout@v6
      - uses: bleep-build/bleep-setup-action@0.0.2
      - id: get_version
        uses: battila7/get-version-action@v2
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: .bleep/generated-resources/crossterm/tui.scripts.GenJniLibrary
          pattern: tui.scripts.GenJniLibrary-*
          merge-multiple: true
      - name: Display structure of downloaded files
        run: find .bleep/generated-resources/crossterm
      # next two tasks are optimization to avoid compiling rust code again
      - name: load build
        run: bleep projects
      - name: touch all downloaded files (for newer timestamp)
        run: find .bleep/generated-resources/crossterm | xargs touch
      - name: Release
        run: bleep publish
        env:
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
      - name: Upload-to-release
        uses: softprops/action-gh-release@v3
        with:
          name: "${{ steps.get_version.outputs.version-without-v }}"
          prerelease: false
          generate_release_notes: true
          files: |
